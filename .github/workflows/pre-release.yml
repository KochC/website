name: build check

on:
  push:
    branches:
      - develop

jobs:
  Compile_UI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: |
          npm ci
          echo 'export var build_version = "0.${{ github.run_number }}";' > ./src/components/version.js
          npm run build
